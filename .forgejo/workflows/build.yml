name: Build & Push
on: [push]
jobs:
  build:
    runs-on: docker
    container: docker:latest
    env:
      DOCKER_HOST: tcp://192.168.1.138:2375
    steps:
      - run: apk add --no-cache git
      - run: git clone https://git.keurigsweb.com/david/systemdashboard.git . && git checkout ${{ github.sha }}
      - run: docker build -t git.keurigsweb.com/david/systemdashboard:latest .
      - run: docker login -u david -p ${{ secrets.REGISTRY_TOKEN }} git.keurigsweb.com
      - run: docker push git.keurigsweb.com/david/systemdashboard:latest
